<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team Haimיוני חיים, מאמן ריצה אישי</title>
<meta name="description" content="Team Haimליווי אישי לרצים. יוני חיים, אלוף ישראל ומאמן ריצה, בונה תהליך אימון מדויק ומבוסס נתונים."/>
<meta property="og:title" content="Team Haimיוני חיים, מאמן ריצה אישי"/>
<meta property="og:description" content="ליווי אישי לרצים שרוצים להתקדם באמת. תוכנית מותאמת, נתונים אמיתיים, ליווי צמוד."/>
<meta property="og:type" content="website"/>
<meta name="theme-color" content="#fcfbf9"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Spectral:ital,wght@0,200;0,300;0,400;1,300&family=Assistant:wght@300;400;500;600&family=Frank+Ruhl+Libre:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --paper: #fcfbf9;
  --ink:   #282623;
  --char:  #16130e;
  --line:  #d3caba;
  --muted: #8a8174;
  --ease:  cubic-bezier(.22,1,.36,1);
}
html[lang="he"] { --fs:'Assistant',system-ui,sans-serif; --fsr:'Frank Ruhl Libre',Georgia,serif; }
html[lang="en"] { --fs:'Inter',system-ui,sans-serif;     --fsr:'Spectral',Georgia,serif; }

*,::before,::after { box-sizing:border-box; margin:0; padding:0; border:0 solid var(--line); }
html { line-height:1.5; -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
body { background:var(--paper); color:var(--ink); font-family:var(--fs); -webkit-font-smoothing:antialiased; }
img  { display:block; max-width:100%; }
a    { color:inherit; text-decoration:none; }
button { cursor:pointer; background:none; border:none; font:inherit; color:inherit; padding:0; }
h1,h2,h3,h4,h5,h6 { font-size:inherit; font-weight:inherit; }
ul,ol { list-style:none; }
:focus-visible { outline:1.5px solid var(--ink); outline-offset:2px; }

.label { font-family:var(--fs); font-size:11px; text-transform:uppercase; letter-spacing:.22em; }
.serif { font-family:var(--fsr); }
.muted { color:var(--muted); }

.link-u { position:relative; display:inline-block; }
.link-u::after {
  content:''; position:absolute; bottom:0; left:0;
  height:1px; width:100%;
  transform-origin:right; transform:scaleX(0);
  background:currentColor;
  transition:transform .5s var(--ease);
}
.link-u:hover::after, .link-u.on::after { transform-origin:left; transform:scaleX(1); }

.mx-page { max-width:1600px; margin-inline:auto; }
.px { padding-inline:1.5rem; }
@media(min-width:768px){ .px{ padding-inline:2.5rem; } }

#app { transition:opacity .18s ease; min-height:100vh; }
#app.fade { opacity:0; }

/* ── HEADER ── */
#hdr {
  position:fixed; inset-inline:0; top:0; z-index:50;
  background:rgba(252,251,249,.82);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.hdr-in {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:1.25rem;
  display:flex; align-items:center; justify-content:space-between;
}
@media(min-width:768px){ .hdr-in{ padding-inline:2.5rem; padding-block:1.5rem; } }

.logo { font-family:var(--fsr); font-size:clamp(1.2rem,2.4vw,1.75rem); font-weight:400; color:var(--ink); line-height:1; letter-spacing:.02em; }

.nav-d { display:none; align-items:center; gap:2.25rem; }
@media(min-width:768px){ .nav-d{ display:flex; } }
.nav-d a { color:var(--muted); transition:color .4s; }
.nav-d a:hover, .nav-d a.on { color:var(--ink); }

.hdr-right { display:flex; align-items:center; gap:1.25rem; }
.lang-btn  { color:var(--muted); transition:color .3s; }
.lang-btn:hover { color:var(--ink); }

.ham { display:flex; flex-direction:column; gap:5px; padding:4px; }
.ham span { display:block; width:22px; height:1px; background:var(--ink); transition:transform .4s var(--ease),opacity .3s; }
@media(min-width:768px){ .ham{ display:none; } }

#mob-nav {
  position:fixed; inset:0; z-index:40; background:var(--paper);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem;
  transition:opacity .5s var(--ease); pointer-events:none; opacity:0;
}
#mob-nav.open { pointer-events:auto; opacity:1; }
#mob-nav a { font-family:var(--fsr); font-size:1.875rem; font-weight:300; color:var(--ink); }

/* ── FOOTER ── */
footer { position:relative; z-index:10; border-top:1px solid var(--line); }
.ftr-in {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:3rem;
  display:flex; flex-direction:column; gap:2rem;
}
@media(min-width:768px){
  .ftr-in{ flex-direction:row; align-items:flex-end; justify-content:space-between; padding-inline:2.5rem; padding-block:4rem; }
}
.ftr-tag { font-family:var(--fsr); font-size:1.125rem; font-weight:300; max-width:20rem; line-height:1.55; color:rgba(40,38,35,.65); }
.ftr-links { display:flex; flex-direction:column; gap:.6rem; }
@media(min-width:768px){ .ftr-links{ align-items:flex-end; } }
.ftr-links a { color:var(--muted); transition:color .3s; }
.ftr-links a:hover { color:var(--ink); }
.ftr-copy { color:var(--muted); margin-top:.5rem; font-size:11px; }

/* ── HOME ── */
.home-hero {
  min-height:100svh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding-inline:1.5rem; padding-block:7rem 5rem; gap:0;
}
.home-eyebrow { color:var(--muted); margin-bottom:1rem; }
.home-tag {
  font-family:var(--fsr); font-size:1.75rem; font-weight:300;
  line-height:1.35; text-align:center; max-width:40rem;
  color:var(--ink); margin-bottom:3rem;
}
@media(min-width:768px){ .home-tag{ font-size:2.4rem; } }

.home-cats {
  display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
  gap:1.25rem 1.5rem; margin-bottom:3.5rem; max-width:36rem;
}
@media(min-width:768px){ .home-cats{ flex-wrap:nowrap; max-width:none; gap:0 1.5rem; margin-bottom:4rem; } }
.home-cats a { color:var(--muted); transition:color .3s; }
.home-cats a:hover { color:var(--ink); }

.feat {
  position:relative; overflow:hidden;
  background:rgba(211,202,186,.4);
  cursor:pointer; display:block;
  height:64vw; width:51.2vw;
}
@media(min-width:640px){ .feat{ height:58vw; width:46.4vw; } }
@media(min-width:768px){ .feat{ height:58vh; width:46.4vh; } }

.feat-slide { position:absolute; inset:0; opacity:0; transition:opacity 1s var(--ease); }
.feat-slide.active { opacity:1; }
.feat-slide img {
  width:100%; height:100%; object-fit:cover; object-position:center 20%;
  opacity:.88;
  transition:transform 5200ms var(--ease), opacity 1400ms var(--ease);
}
.feat-slide.active img { transform:scale(1.05); }
.feat:hover .feat-slide.active img { opacity:.96; }

.feat-grad {
  position:absolute; inset:0; z-index:1;
  background:linear-gradient(to bottom,rgba(22,19,14,.08),transparent 45%,rgba(22,19,14,.6));
  pointer-events:none;
}
.feat-info { position:absolute; inset-inline:0; bottom:0; z-index:2; padding-inline:1.5rem; padding-bottom:2rem; }
@media(min-width:768px){ .feat-info{ padding-inline:2rem; padding-bottom:2.5rem; } }
.feat-cat   { color:rgba(252,251,249,.75); transition:opacity .5s; }
.feat-title { font-family:var(--fsr); font-size:1.25rem; font-weight:300; color:var(--paper); margin-top:.4rem; }

.feat-dots { position:absolute; inset-inline:0; top:1.25rem; z-index:2; display:flex; justify-content:center; gap:.4rem; }
.feat-dot { width:18px; height:1.5px; background:rgba(252,251,249,.35); transition:background .4s, width .4s var(--ease); }
.feat-dot.active { background:rgba(252,251,249,.88); width:28px; }

/* Why section */
.hw-wrap { max-width:1600px; margin-inline:auto; padding-inline:1.5rem; padding-block:5rem; border-top:1px solid var(--line); }
@media(min-width:768px){ .hw-wrap{ padding-inline:2.5rem; padding-block:7rem; } }
.hw-head { max-width:36rem; margin-bottom:3.5rem; }
.hw-h2 { font-family:var(--fsr); font-weight:300; font-size:2rem; line-height:1.25; margin-top:.9rem; }
@media(min-width:768px){ .hw-h2{ font-size:2.75rem; } }
.hw-grid { display:grid; grid-template-columns:1fr; gap:2.5rem; }
@media(min-width:768px){ .hw-grid{ grid-template-columns:repeat(3,1fr); gap:3rem; } }
.hw-item { padding-top:1.5rem; border-top:1px solid var(--line); }
.hw-item-t { font-family:var(--fsr); font-size:1.25rem; font-weight:300; margin-bottom:.75rem; }
.hw-item-d { font-size:.92rem; line-height:1.7; color:rgba(40,38,35,.7); }
html[lang="he"] .hw-item-d { font-family:var(--fsr); font-size:.98rem; }
.hw-cta { display:flex; justify-content:center; margin-top:4.5rem; }

.btn-primary {
  display:inline-flex; align-items:center; gap:.6rem;
  background:var(--ink); color:var(--paper); border:1px solid var(--ink);
  padding:1rem 2.25rem; transition:background .4s,color .4s;
  font-family:var(--fs);
}
.btn-primary:hover { background:transparent; color:var(--ink); }

/* ── ABOUT ── */
.ab-page { padding-top:56px; }
.ab-wrap { max-width:1600px; margin-inline:auto; padding-inline:1.5rem; padding-block:6rem; }
@media(min-width:768px){ .ab-wrap{ padding-inline:2.5rem; padding-block:11rem 8rem; } }
.ab-grid { display:grid; grid-template-columns:1fr; gap:3rem; }
@media(min-width:768px){
  .ab-grid{ grid-template-columns:repeat(12,1fr); gap:4rem; }
  .ab-c5{ grid-column:span 5; }
  .ab-c7{ grid-column:span 7; padding-inline-start:2rem; }
}
.ab-port { position:relative; overflow:hidden; background:rgba(211,202,186,.5); aspect-ratio:4/5; }
.ab-port img { width:100%; height:100%; object-fit:cover; object-position:center 10%; }

.ab-eye { color:var(--muted); }
.ab-h1 { font-family:var(--fsr); font-weight:200; line-height:1.2; margin-top:1.25rem; font-size:2.5rem; max-width:36rem; }
@media(min-width:768px){ .ab-h1{ font-size:3.4rem; } }
.ab-body { margin-top:2.5rem; max-width:36rem; display:flex; flex-direction:column; gap:1.5rem; font-size:1rem; line-height:1.7; color:rgba(40,38,35,.75); }
html[lang="he"] .ab-body { font-family:var(--fsr); font-size:1.05rem; }
.ab-facts { margin-top:3rem; padding-top:2rem; border-top:1px solid var(--line); display:flex; flex-wrap:wrap; gap:1.75rem 3rem; }
.ab-fk { color:var(--muted); margin-bottom:.35rem; }
.ab-fv { font-family:var(--fsr); font-size:1.1rem; font-weight:300; }
.ab-cta { display:inline-flex; align-items:center; gap:.5rem; margin-top:2.25rem; font-family:var(--fsr); font-size:1.125rem; font-weight:300; }

/* ── TEAM ── */
.tm-page { padding-top:56px; }
.tm-wrap { max-width:1600px; margin-inline:auto; padding-inline:1.5rem; padding-block:6rem; }
@media(min-width:768px){ .tm-wrap{ padding-inline:2.5rem; padding-block:11rem 8rem; } }
.tm-h1 { font-family:var(--fsr); font-weight:200; line-height:1; font-size:2.75rem; }
@media(min-width:768px){ .tm-h1{ font-size:4rem; } }
.tm-intro { margin-top:1.25rem; max-width:38rem; font-family:var(--fsr); font-size:1.1rem; font-weight:300; line-height:1.65; color:rgba(40,38,35,.7); }
@media(min-width:768px){ .tm-intro{ font-size:1.25rem; } }

.tm-steps { margin-top:4.5rem; border-top:1px solid var(--line); }
.tm-step { padding-block:2rem; border-bottom:1px solid var(--line); display:grid; grid-template-columns:1fr; gap:.75rem; }
@media(min-width:768px){ .tm-step{ grid-template-columns:5rem 1fr; gap:2rem; padding-block:2.25rem; align-items:baseline; } }
.tm-step-n { font-family:var(--fsr); font-size:1rem; color:var(--muted); }
.tm-step-t { font-family:var(--fsr); font-size:1.35rem; font-weight:300; margin-bottom:.5rem; }
.tm-step-d { font-size:.92rem; line-height:1.7; color:rgba(40,38,35,.7); max-width:38rem; }
html[lang="he"] .tm-step-d { font-family:var(--fsr); font-size:.98rem; }

.tm-fit { margin-top:5rem; display:grid; grid-template-columns:1fr; gap:3rem; }
@media(min-width:768px){ .tm-fit{ grid-template-columns:1fr 1fr; gap:5rem; } }
.tm-fit-h { font-family:var(--fsr); font-size:1.4rem; font-weight:300; margin-bottom:1.25rem; }
.tm-fit-l { display:flex; flex-direction:column; gap:.9rem; }
.tm-fit-l li { font-size:.92rem; line-height:1.6; color:rgba(40,38,35,.72); padding-inline-end:1.1rem; position:relative; }
html[lang="he"] .tm-fit-l li { font-family:var(--fsr); font-size:.98rem; }
.tm-fit-l li::before { content:''; position:absolute; inset-inline-end:0; color:var(--muted); }

.tm-close { margin-top:5.5rem; padding-top:3rem; border-top:1px solid var(--line); max-width:36rem; }
.tm-close-t { font-family:var(--fsr); font-size:1.5rem; font-weight:300; line-height:1.45; margin-bottom:1.75rem; }

/* ── PROGRAMS ── */
.ws-page { padding-top:56px; }
.ws-wrap { max-width:1600px; margin-inline:auto; padding-inline:1.5rem; padding-block:6rem; }
@media(min-width:768px){ .ws-wrap{ padding-inline:2.5rem; padding-block:11rem 8rem; } }
.ws-h1 { font-family:var(--fsr); font-weight:200; line-height:1; font-size:2.75rem; }
@media(min-width:768px){ .ws-h1{ font-size:4rem; } }
.ws-intro { margin-top:1.25rem; max-width:38rem; font-family:var(--fsr); font-size:1.1rem; font-weight:300; line-height:1.65; color:rgba(40,38,35,.7); }
@media(min-width:768px){ .ws-intro{ font-size:1.25rem; } }
.ws-list { margin-top:4rem; border-top:1px solid var(--line); }
.ws-row { padding-block:2.5rem; border-bottom:1px solid var(--line); display:grid; grid-template-columns:1fr; gap:1.5rem; }
@media(min-width:768px){
  .ws-row{ grid-template-columns:repeat(12,1fr); gap:2rem 4rem; padding-block:3rem; align-items:start; }
  .wsr-l{ grid-column:span 7; }
  .wsr-r{ grid-column:span 5; display:flex; flex-direction:column; align-items:flex-start; gap:1rem; }
}
.wsr-type { color:var(--muted); margin-bottom:.5rem; }
.wsr-name { font-family:var(--fsr); font-size:1.5rem; font-weight:300; line-height:1.2; margin-bottom:.85rem; }
@media(min-width:768px){ .wsr-name{ font-size:1.85rem; } }
.wsr-desc { font-size:.92rem; line-height:1.75; color:rgba(40,38,35,.7); max-width:36rem; }
html[lang="he"] .wsr-desc { font-family:var(--fsr); font-size:.97rem; }
.wsr-specs { display:flex; flex-wrap:wrap; gap:1rem 2.5rem; margin-top:1.5rem; }
.wsr-sk { color:var(--muted); margin-bottom:.2rem; }
.wsr-sv { font-size:.9rem; }
.wsr-price { font-family:var(--fsr); font-size:2.25rem; font-weight:300; line-height:1; }
.wsr-pnote { color:var(--muted); margin-top:.35rem; }
.btn-ws { display:inline-block; margin-top:.75rem; border:1px solid var(--line); padding:.8rem 1.75rem; color:var(--ink); transition:background .4s,color .4s,border-color .4s; white-space:nowrap; }
.btn-ws:hover { background:var(--ink); color:var(--paper); border-color:var(--ink); }

/* ── CONTACT ── */
.ct-page { padding-top:56px; }
.ct-wrap { max-width:1600px; margin-inline:auto; padding-inline:1.5rem; padding-block:6rem; }
@media(min-width:768px){ .ct-wrap{ padding-inline:2.5rem; padding-block:11rem 8rem; } }
.ct-grid { display:grid; grid-template-columns:1fr; gap:4rem; }
@media(min-width:768px){
  .ct-grid{ grid-template-columns:repeat(12,1fr); gap:4rem; }
  .ct-l{ grid-column:span 4; }
  .ct-r{ grid-column:span 8; }
}
.ct-h1 { font-family:var(--fsr); font-weight:200; line-height:1; font-size:2.75rem; margin-bottom:2rem; }
@media(min-width:768px){ .ct-h1{ font-size:4rem; } }
.ct-sub { font-family:var(--fsr); font-size:1.05rem; font-weight:300; color:rgba(40,38,35,.7); line-height:1.65; margin-bottom:2.5rem; max-width:22rem; }
.ct-chs { display:flex; flex-direction:column; }
.ct-ch { display:flex; align-items:flex-start; gap:.75rem; padding-block:1.25rem; border-bottom:1px solid var(--line); color:var(--ink); transition:opacity .3s; }
.ct-ch:first-child { border-top:1px solid var(--line); }
.ct-ch:hover { opacity:.6; }
.ct-ch-k { color:var(--muted); min-width:5.5rem; flex-shrink:0; }
.ct-ch-v { font-family:var(--fsr); font-size:1rem; font-weight:300; }
.ct-fh { font-family:var(--fsr); font-size:1.5rem; font-weight:300; margin-bottom:2rem; color:rgba(40,38,35,.75); }
.fg { margin-bottom:2rem; }
.fg label { display:block; color:var(--muted); margin-bottom:.45rem; }
.fg input,.fg textarea,.fg select {
  width:100%; background:transparent; border-bottom:1px solid var(--line);
  font-family:var(--fs); font-size:.95rem; color:var(--ink);
  padding-block:.5rem; outline:none; -webkit-appearance:none; transition:border-color .3s;
}
.fg input:focus,.fg textarea:focus,.fg select:focus { border-bottom-color:var(--ink); }
.fg input::placeholder,.fg textarea::placeholder { color:var(--line); }
.fg textarea { resize:vertical; min-height:120px; }
.fg-row { display:grid; grid-template-columns:1fr 1fr; gap:0 1.5rem; }
@media(max-width:480px){ .fg-row{ grid-template-columns:1fr; } }
.btn-send { display:inline-block; background:var(--ink); color:var(--paper); border:1px solid var(--ink); padding:1rem 2.5rem; transition:background .4s,color .4s; margin-top:.5rem; cursor:pointer; font-family:var(--fs); }
.btn-send:hover { background:transparent; color:var(--ink); }

/* ── APP SECTION ── */
.app-wrap { max-width:1600px; margin-inline:auto; padding-inline:1.5rem; padding-block:5rem; border-top:1px solid var(--line); }
@media(min-width:768px){ .app-wrap{ padding-inline:2.5rem; padding-block:7rem; } }
.app-head { max-width:36rem; margin-bottom:3.5rem; }
.app-h2 { font-family:var(--fsr); font-weight:300; font-size:2rem; line-height:1.25; margin-top:.9rem; }
@media(min-width:768px){ .app-h2{ font-size:2.75rem; } }
.app-grid { display:grid; grid-template-columns:1fr; gap:2.5rem; }
@media(min-width:768px){ .app-grid{ grid-template-columns:repeat(3,1fr); gap:3rem; } }
.app-item { padding-top:1.5rem; border-top:1px solid var(--line); }
.app-item-t { font-family:var(--fsr); font-size:1.25rem; font-weight:300; margin-bottom:.75rem; }
.app-item-d { font-size:.92rem; line-height:1.7; color:rgba(40,38,35,.7); }
html[lang="he"] .app-item-d { font-family:var(--fsr); font-size:.98rem; }
.app-badge { display:inline-block; margin-top:.75rem; padding:.3rem .75rem; border:1px solid var(--line); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
.app-cta { margin-top:3.5rem; padding-top:2.5rem; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:1.25rem; }
@media(min-width:768px){ .app-cta{ flex-direction:row; align-items:center; justify-content:space-between; gap:3rem; } }
.app-cta-t { font-family:var(--fsr); font-size:1.35rem; font-weight:300; max-width:30rem; line-height:1.5; }

/* ── WhatsApp FAB ── */
.wa-fab {
  position:fixed; bottom:1.5rem; left:1.5rem;
  width:52px; height:52px; border-radius:50%;
  background:#25D366;
  display:flex; align-items:center; justify-content:center;
  z-index:99; box-shadow:0 4px 18px rgba(37,211,102,.4);
  transition:transform .2s, box-shadow .2s;
}
.wa-fab:hover { transform:scale(1.08) translateY(-2px); box-shadow:0 8px 26px rgba(37,211,102,.5); }
</style>
</head>
<body>

<div id="mob-nav" role="dialog" aria-modal="true">
  <a href="#/" data-nav class="serif" style="font-size:1.75rem;font-weight:300">Team Haim</a>

<script>
const HL = document.documentElement;

function applyLang(l) {

  document.querySelectorAll('[data-he]').forEach(el => el.style.display = l==='he' ? '' : 'none');

function T(he, en) { return lang === 'he' ? he : en; }

const mobNav = document.getElementById('mob-nav');

function closeMob() { mobNav.classList.remove('open'); hamBtn.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }

const app = document.getElementById('app');

function route() {
  const hash = location.hash.replace('#','') || '/';
  const page = hash.split('/').filter(Boolean)[0] || '';
  document.querySelectorAll('.nav-d a').forEach(a => {
    const h = a.getAttribute('href').replace('#/','');
    a.classList.toggle('on', h === page);

  if (!page)                html = buildHome();
  else if (page==='about')   html = buildAbout();
  else if (page==='team')    html = buildTeam();
  else if (page==='programs')html = buildPrograms();
  else if (page==='contact') html = buildContact();

  setTimeout(() => {
    app.innerHTML = html;
    app.classList.remove('fade');
    window.scrollTo(0,0);
    applyLang(lang);
    bindEvents();
  }, 180);
}

function bindEvents() {

function startSlideshow() {
  if (_slideTimer) clearInterval(_slideTimer);
  _slideIdx = 0;
  _slideTimer = setInterval(advanceSlide, 4000);
}
function advanceSlide() {
  const slides = document.querySelectorAll('.feat-slide');
  const dots   = document.querySelectorAll('.feat-dot');
  const catEl  = document.getElementById('feat-cat');
  const ttlEl  = document.getElementById('feat-title');
  if (!slides.length) return;
  slides[_slideIdx].classList.remove('active');
  dots[_slideIdx].classList.remove('active');
  _slideIdx = (_slideIdx + 1) % SLIDES.length;
  slides[_slideIdx].classList.add('active');
  dots[_slideIdx].classList.add('active');
  const s = SLIDES[_slideIdx];
  if (catEl) catEl.innerHTML = `<span data-he>${s.catHe}</span><span data-en>${s.catEn}</span>`;
  if (ttlEl) ttlEl.innerHTML = `<span data-he>${s.tHe}</span><span data-en>${s.tEn}</span>`;
  applyLang(lang);
}
